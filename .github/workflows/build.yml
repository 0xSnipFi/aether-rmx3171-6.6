name: build

on:
  push:
    branches: [ main ]
    paths-ignore: [ "**.md", "docs/**" ]
  pull_request:
    branches: [ main ]
    paths-ignore: [ "**.md", "docs/**" ]
  workflow_dispatch:

jobs:
  base-build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libssl-dev libelf-dev \
            libncurses-dev xz-utils kmod cpio python3 zip rsync \
            clang lld llvm dwarves \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Fetch upstream Linux 6.6.50 (for missing UAPI headers)
        run: |
          cd /tmp
          curl -LO https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.6.50.tar.xz
          tar -xJf linux-6.6.50.tar.xz

      - name: Restore lost headers
        run: |
          # Without Samsung base, we can verify only AETHER overlay validity.
          # CI runs DTC parse + defconfig sanity, not full build.
          mkdir -p kernel-6.6
          echo "(placeholder — full build needs SAMSUNG_KERNEL_ROOT)" > kernel-6.6/STAGE_NOT_PERFORMED

      - name: Lint overlay config
        run: |
          # Check that overlay config parses
          grep -E '^CONFIG_[A-Z_0-9]+=' aether-rmx3171/configs/aether_rmx3171_overlay.config | wc -l

      - name: Lint DTS
        run: |
          # Basic syntactic check on RMX3171 DTS
          which dtc || sudo apt-get install -y device-tree-compiler
          # Cannot run real DTC without includes; verify it's a well-formed text file
          test -s aether-rmx3171/dts/mt6768-rmx3171.dts

      - name: Smoke check scripts
        run: |
          bash -n aether-rmx3171/build/build_aether_6_6.sh
          bash -n aether-rmx3171/build/stage_headers.sh
          bash -n aether-rmx3171/build/restore_lost_headers.sh
          bash -n scripts/sync_samsung_base.sh

      - name: Verify hardware truth doc up-to-date
        run: |
          test -s docs/01_hardware_truth.md
          grep -q "MT6768" docs/01_hardware_truth.md
          grep -q "6000 mAh" docs/01_hardware_truth.md
          grep -q "Goodix" docs/01_hardware_truth.md

      - name: License compliance
        run: |
          grep -q "GPL-2.0-only" LICENSE
          ! find aether-rmx3171/ device/ -type f -name '*.ko' -o -name '*.so' | grep -q .  # no binary blobs in overlay/device

  doc-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Required docs exist
        run: |
          test -f README.md
          test -f LICENSE
          test -f CONTRIBUTING.md
          test -f docs/01_hardware_truth.md
          test -f AETHER_6.6_STATUS.md
